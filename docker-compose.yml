services:
  dashboard:
    build: .
    ports:
      - "3022:3000"
    environment:
      INGEST_API_KEY: ${INGEST_API_KEY:-change-me-in-production}
      DASHBOARD_USER: ${DASHBOARD_USER:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me-in-production}
      DATA_FILE_PATH: /app/data/calls.json
    volumes:
      - calls-data:/app/data
    restart: unless-stopped

volumes:
  calls-data:
